name: IPMA Weather Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_KEY }}' > secrets/gcp_key.json

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          echo '${{ secrets.DBT_PROFILES }}' > ~/.dbt/profiles.yml

      - name: Run ingestion script
        run: python ingestion/ingest.py

      - name: Run dbt
        run: |
          cd dbt_project
          python -m dbt deps
          python -m dbt run
          python -m dbt test